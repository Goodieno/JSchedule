<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재희's Teacher Timer</title>

<style>
/* ================= ANIMATIONS ================= */
.falling-emoji {
  position: fixed;
  top: -50px;
  z-index: 9999;
  pointer-events: none;
  font-size: 24px;
  animation: fall linear forwards;
}
@keyframes fall {
  to { transform: translateY(110vh) rotate(360deg); }
}

/* ================= THEME & LAYOUT ================= */
body{
background:#ffe6f2; 
font-family:'Malgun Gothic', Arial;
color:#ff4d94;
text-align:center;
margin:0;
padding:20px;
overflow-x: hidden;
}
h2{margin:10px 0;cursor:pointer; color:#ff1a75;}
#clockBox{margin:auto;width:320px; height:320px; display:flex; align-items:center; justify-content:center;}
canvas{background:white; border-radius:50%; box-shadow:0 0 20px rgba(255,102,178,.4); border: 8px solid #ffb3d9;}
#periodLabel{font-size:22px;font-weight:bold;margin-top:10px;}
#info{margin-top:20px; font-size:18px;}
#weather,#air{font-weight:bold; margin-top:5px; color:#ff66a3;}

table{margin:auto;margin-top:20px;border-collapse:collapse;width:95%;max-width:400px; background:white; border-radius:15px; overflow:hidden;}
th,td{padding:10px;border-bottom:1px solid #ffe6f2;}
th{color:white; background:#ffb3d9;}

.currentClass{ background:#fff0f5 !important; box-shadow:0 0 15px rgba(255,51,133,0.4); font-weight:bold; }
.prepPeriod { color: #20b2aa !important; } 
.lunchText { color: #ff3399; font-weight: bold; }
.periodTime { font-size: 10px; color: #ff99cc; margin-right: 5px; display: none; }
#scheduleTable td:hover .periodTime, #scheduleTable td:active .periodTime { display: inline; }

/* WEEK POPUP */
#weekPopup {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(255, 230, 242, 0.9);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}
#weekBox {
  background: white;
  padding: 20px;
  border-radius: 20px;
  width: 95%;
  max-width: 600px;
  color: #ff4d94;
  border: 4px solid #ffb3d9;
}
#weekBox h3 { margin-top: 0; text-align: center; color: #ff1a75; }
#weekTable { width: 100%; border-collapse: collapse; text-align: center; }
#weekTable th { background: #ffcce6; color: #ff3385; padding: 8px; }
#weekTable td { padding: 10px; border-top: 1px solid #ffe6f2; color: #ff4d94; font-size: 13px; }
</style>
</head>

<body>

<h2 id="today"></h2>

<div id="clockBox">
<canvas id="clock" width="300" height="300"></canvas>
</div>

<div id="periodLabel"></div>

<div id="info">
<div id="weather">🌤 날씨 불러오는 중...</div>
<div id="air">😷 미세먼지 불러오는 중...</div>
</div>

<table id="scheduleTable">
<tr><th>교시</th><th>과목</th></tr>
</table>

<div id="weekPopup">
<div id="weekBox">
<h3>🎀 5학년 주간 시간표 🎀</h3>
<table id="weekTable">
<tr><th>교시</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr>
<tr><td>1교시</td><td>수학</td><td>수학</td><td>국어</td><td><span class="prepPeriod">영어</span></td><td>국어</td></tr>
<tr><td>2교시</td><td>국어</td><td><span class="prepPeriod">체육</span></td><td>수학</td><td>국어</td><td><span class="prepPeriod">체육</span></td></tr>
<tr><td>3교시</td><td><span class="prepPeriod">영어</span></td><td>국어</td><td>사회</td><td>수학</td><td>사회</td></tr>
<tr><td>4교시</td><td><span class="prepPeriod">과학</span></td><td>사회</td><td>실과</td><td><span class="prepPeriod">과학</span></td><td>과학</td></tr>
<tr><td>5교시</td><td>음악</td><td>미술</td><td><span class="prepPeriod">영어</span></td><td>실과</td><td><span class="prepPeriod">도덕</span></td></tr>
<tr><td>6교시</td><td>창체</td><td>미술</td><td>-</td><td>음악</td><td>창체</td></tr>
</table>
</div>
</div>

<script>
const API_KEY="fa9fe37b9be14839fe6774643939e974";
let currentCondition = "default"; 

const schedule = {
  Monday: ["수학", "국어", "영어", "과학", "음악", "창체"],
  Tuesday: ["수학", "체육", "국어", "사회", "미술", "미술"],
  Wednesday: ["국어", "수학", "사회", "실과", "영어"],
  Thursday: ["영어", "국어", "수학", "과학", "실과", "음악"],
  Friday: ["국어", "체육", "사회", "과학(교실)", "도덕", "창체"]
};

const dayNames = {
  Monday: "월요일", Tuesday: "화요일", Wednesday: "수요일",
  Thursday: "목요일", Friday: "금요일", Saturday: "토요일", Sunday: "일요일"
};

const now = new Date();
const todayEn = now.toLocaleDateString('en-US', { weekday: 'long' });
document.getElementById("today").textContent = `🎀 ${dayNames[todayEn] || todayEn} 🎀`;

const blocks = [
    { type: "class", label: "1교시", start: "09:00", end: "09:40" },
    { type: "break", label: "쉬는 시간", start: "09:40", end: "09:50" },
    { type: "class", label: "2교시", start: "09:50", end: "10:30" },
    { type: "break", label: "쉬는 시간", start: "10:30", end: "10:40" },
    { type: "class", label: "3교시", start: "10:40", end: "11:20" },
    { type: "break", label: "쉬는 시간", start: "11:20", end: "11:30" },
    { type: "class", label: "4교시", start: "11:30", end: "12:10" },
    { type: "lunch", label: "점심시간", start: "12:10", end: "13:10" },
    { type: "class", label: "5교시", start: "13:10", end: "13:50" },
    { type: "break", label: "쉬는 시간", start: "13:50", end: "14:00" },
    { type: "class", label: "6교시", start: "14:00", end: "14:40" }
];

const table = document.getElementById("scheduleTable");
const isWeekend = (todayEn === "Saturday" || todayEn === "Sunday");

if (isWeekend) {
  table.innerHTML = "<tr><td colspan='2' style='font-size:22px; padding:30px;'>🎀 즐거운 주말 🎀</td></tr>";
} else {
  let classIndex = 0;
  blocks.forEach((b) => {
    if (b.type === "break") return;
    let row = document.createElement("tr");
    row.dataset.start = b.start; row.dataset.end = b.end;
    let p = document.createElement("td");
    let timeSpan = document.createElement("span");
    timeSpan.className = "periodTime"; timeSpan.textContent = `${b.start}-${b.end}`;
    p.appendChild(timeSpan); p.appendChild(document.createTextNode(b.label));
    let c = document.createElement("td");
    if (b.type === "class") {
        let subject = (schedule[todayEn] || [])[classIndex] || "-";
        c.textContent = subject;
        const preps = ["영어", "체육", "도덕"];
        if (preps.includes(subject) || (subject === "과학" && todayEn !== "Friday")) {
            c.classList.add("prepPeriod");
        }
        classIndex++;
    } else if (b.type === "lunch") {
        c.innerHTML = '<span class="lunchText">맛있는 점심 🍱</span>';
    }
    row.appendChild(p); row.appendChild(c);
    table.appendChild(row);
  });
}

const canvas=document.getElementById("clock");
const ctx=canvas.getContext("2d");
function toMin(t){let[h,m]=t.split(":"); return h*60+m;}

let pulseGlow = 0;
let pulseDir = 1;

function drawClock(){
    let now = new Date();
    let mins = now.getHours()*60 + now.getMinutes() + now.getSeconds()/60;
    ctx.clearRect(0,0,300,300);
    
    // Background and Ticks
    let bgGrad = ctx.createRadialGradient(150,150,50, 150,150,133);
    bgGrad.addColorStop(0, "#ffffff"); bgGrad.addColorStop(1, "#fff0f6"); 
    ctx.beginPath(); ctx.arc(150,150,133,0,Math.PI*2); ctx.fillStyle=bgGrad; ctx.fill();
    for(let i=0;i<60;i++){
        let angle=i*Math.PI/30; let isMajor = i % 5 === 0; let len = isMajor ? 14 : 6;
        let x1=150+Math.cos(angle)*(125-len); let y1=150+Math.sin(angle)*(125-len);
        let x2=150+Math.cos(angle)*125; let y2=150+Math.sin(angle)*125;
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
        ctx.strokeStyle = isMajor ? "#ff66a3" : "#ffb3d9"; ctx.lineWidth = isMajor ? 4 : 2; ctx.lineCap = "round"; ctx.stroke();
    }
  
    const isWednesday = (todayEn === "Wednesday");
    const schoolStart = toMin("09:00");
    const workEnd = isWednesday ? toMin("13:50") : toMin("14:40");

    let active = blocks.find(b => mins >= toMin(b.start) && mins < toMin(b.end));
    
    // If it's Wednesday, we ignore any blocks after 13:50
    if (isWednesday && mins >= workEnd) {
        active = null;
    }

    let label = "자유 시간 🎀"; 
    let color = "#cccccc"; 
    let total = 60; 
    let remain = 60 - (now.getMinutes() + (now.getSeconds() / 60)); 

    const isWorkday = (now.getDay() >= 1 && now.getDay() <= 5);

    if (isWorkday && mins < schoolStart) {
        label = "수업 준비 중 ☕";
        color = "#cccccc";
        total = schoolStart; // Countdown from 00:00 to 09:00 (540 mins)
        remain = schoolStart - mins;
    } else if (isWorkday && mins < workEnd && active) {
        label = active.label;
        if(active.type === "class") color = "#ff1a75"; 
        else if(active.type === "break") color = "#00bfff"; 
        else if(active.type === "lunch") color = "#ffd700"; 
        
        total = toMin(active.end) - toMin(active.start);
        remain = toMin(active.end) - mins;
    } else {
        label = isWeekend ? "🫶 즐거운 주말 🫶" : "자유 시간 🙏";
        color = "#cccccc";
        // Default 60min visual loop for free time
        total = 60;
        remain = 60 - (now.getMinutes() + (now.getSeconds() / 60));
    }

    if(total > 0){
        let percent = remain / total;
        pulseGlow += 0.4 * pulseDir;
        if(pulseGlow > 14 || pulseGlow < 0) pulseDir *= -1;
        ctx.save();
        ctx.beginPath(); 
        ctx.arc(150,150,140,-Math.PI/2, -Math.PI/2 + (percent * 2 * Math.PI));
        ctx.lineWidth = 10; ctx.strokeStyle = color; ctx.lineCap = "round";
        ctx.shadowBlur = pulseGlow; ctx.shadowColor = color; ctx.stroke();
        ctx.restore();
    }

    let h = now.getHours(); let m = now.getMinutes().toString().padStart(2,"0"); let s = now.getSeconds().toString().padStart(2,"0");
    let ampm = h >= 12 ? "오후" : "오전"; h = h % 12 || 12;
    ctx.fillStyle="#ff80bf"; ctx.font="bold 14px Arial"; ctx.textAlign="center";
    ctx.fillText(ampm, 150, 135);
    ctx.fillStyle="#ff1a75"; ctx.font="bold 32px Arial"; ctx.textAlign="center";
    ctx.fillText(`${h}:${m}:${s}`, 150, 165);
    
    document.getElementById("periodLabel").textContent = label;
    document.getElementById("periodLabel").style.color = color;

    document.querySelectorAll("#scheduleTable tr").forEach(row => {
        const start = row.dataset.start; const end = row.dataset.end;
        if (start && end) {
            const [sh, sm] = start.split(":").map(Number);
            const [eh, em] = end.split(":").map(Number);
            const isCurrent = (mins >= (sh * 60 + sm) && mins < (eh * 60 + em));
            
            // On Wednesdays, don't highlight anything after period 5
            if (isWednesday && toMin(start) >= toMin("13:50")) {
                row.classList.remove("currentClass");
            } else {
                row.classList.toggle("currentClass", isCurrent);
            }
        }
    });
}
setInterval(drawClock, 50); 

function startEmojiRain() {
  setInterval(() => {
    const cur = new Date(); const day = cur.getDay(); const hr = cur.getHours();
    const minsNow = hr * 60 + cur.getMinutes(); const workEndMins = 16 * 60 + 30; 
    let mode = "OFF";
    if (day === 5 && minsNow >= workEndMins) mode = "WEEKEND";
    else if (day === 6) mode = "WEEKEND";
    else if (day === 0) mode = (hr >= 21) ? "POO" : "WEEKEND";
    if (mode === "OFF") return;
    let emojis = ['🐱', '🎀', '🌸', '💖', '✨']; 
    if (mode === "POO") emojis = ['💩', '😭'];
    else {
        if (currentCondition === "Rain" || currentCondition === "Drizzle") emojis = [...emojis, '☔', '💧', '☁️', '🐸'];
        else if (currentCondition === "Snow") emojis = [...emojis, '❄️', '⛄', '🤍', '🌬️'];
    }
    const e = document.createElement('div'); e.className = 'falling-emoji';
    e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    e.style.left = Math.random() * 100 + 'vw'; e.style.animationDuration = (Math.random() * 3 + 2) + 's';
    document.body.appendChild(e); setTimeout(() => e.remove(), 5000);
  }, 350);
}
startEmojiRain();

async function loadWeather(){
try{
    const geoRes=await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`);
    const geoData=await geoRes.json();
    const res=await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${geoData[0].lat}&lon=${geoData[0].lon}&appid=${API_KEY}&units=metric`);
    const data=await res.json();
    currentCondition = data.weather[0].main; 
    const weatherDetails = {"Clear":"☀️ 맑음", "Clouds":"☁️ 흐림", "Rain":"🌧️ 비", "Snow":"❄️ 눈", "Drizzle":"🌦️ 이슬비", "Mist":"🌫️ 안개"};
    document.getElementById("weather").textContent=`날씨: ${weatherDetails[data.weather[0].main] || data.weather[0].main} / ${data.main.temp.toFixed(1)}°C`;
}catch{ document.getElementById("weather").textContent="날씨 확인 불가 🎀"; }
}
loadWeather();

async function loadAir(){
try{
    const geoRes=await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`);
    const geoData=await geoRes.json();
    const res=await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${geoData[0].lat}&lon=${geoData[0].lon}&appid=${API_KEY}`);
    const data=await res.json();
    const levels=["좋음 😊","보통 🙂","그저그럼 😐","나쁨 😷","매우나쁨 ☠️"];
    document.getElementById("air").textContent=`미세먼지: ${levels[data.list[0].main.aqi-1]}`;
}catch{ document.getElementById("air").textContent="미세먼지 확인 불가 😷"; }
}
loadAir();

const weekPopup=document.getElementById("weekPopup");
document.getElementById("today").onclick=()=>{ weekPopup.style.display="flex"; }
weekPopup.onclick=()=>{ weekPopup.style.display="none"; }
</script>
</body>
</html>
