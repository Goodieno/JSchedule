<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재희's Teacher Timer</title>

<style>
/* ================= ANIMATIONS ================= */
.falling-emoji {
  position: fixed;
  top: -50px;
  z-index: 9999;
  pointer-events: none;
  font-size: 24px;
  animation: fall linear forwards;
}
@keyframes fall {
  to { transform: translateY(110vh) rotate(360deg); }
}

/* ================= THEME & LAYOUT ================= */
body{
background:#ffe6f2; 
font-family:'Malgun Gothic', Arial;
color:#ff4d94;
text-align:center;
margin:0;
padding:20px;
overflow-x: hidden;
}
h2{margin:10px 0;cursor:pointer; color:#ff1a75;}
#clockBox{margin:auto;width:320px; height:320px; display:flex; align-items:center; justify-content:center;}
canvas{background:white; border-radius:50%; box-shadow:0 0 20px rgba(255,102,178,.4); border: 8px solid #ffb3d9; image-rendering: -webkit-optimize-contrast;}
#periodLabel{font-size:22px;font-weight:bold;margin-top:10px;}
#info{margin-top:20px; font-size:18px;}
#weather,#air{font-weight:bold; margin-top:5px; color:#ff66a3;}

table{margin:auto;margin-top:20px;border-collapse:collapse;width:95%;max-width:400px; background:white; border-radius:15px; overflow:hidden;}
th,td{padding:10px;border-bottom:1px solid #ffe6f2;}
th{color:white; background:#ffb3d9;}

.currentClass{ background:#fff0f5 !important; box-shadow:0 0 15px rgba(255,51,133,0.4); font-weight:bold; }
.prepPeriod { color: #20b2aa !important; } 
.lunchText { color: #ff3399; font-weight: bold; }
.periodTime { font-size: 10px; color: #ff99cc; margin-right: 5px; display: none; }
#scheduleTable td:hover .periodTime, #scheduleTable td:active .periodTime { display: inline; }

/* WEEK POPUP */
#weekPopup {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(255, 230, 242, 0.9);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}
#weekBox {
  background: white;
  padding: 20px;
  border-radius: 20px;
  width: 95%;
  max-width: 600px;
  color: #ff4d94;
  border: 4px solid #ffb3d9;
}
#weekBox h3 { margin-top: 0; text-align: center; color: #ff1a75; }
#weekTable { width: 100%; border-collapse: collapse; text-align: center; }
#weekTable th { background: #ffcce6; color: #ff3385; padding: 8px; }
#weekTable td { padding: 10px; border-top: 1px solid #ffe6f2; color: #ff4d94; font-size: 13px; }
</style>
</head>

<body>

<h2 id="today"></h2>

<div id="clockBox">
<canvas id="clock" width="300" height="300"></canvas>
</div>

<div id="periodLabel"></div>

<div id="info">
<div id="weather">날씨 불러오는 중...</div>
<div id="air">미세먼지 불러오는 중...</div>
</div>

<table id="scheduleTable">
<tr><th>교시</th><th>과목</th></tr>
</table>

<div id="weekPopup">
<div id="weekBox">
<h3>🎀 5학년 주간 시간표 🎀</h3>
<table id="weekTable">
<tr><th>교시</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th></tr>
<tr><td>1교시</td><td>수학</td><td>수학</td><td>국어</td><td><span class="prepPeriod">영어</span></td><td>국어</td></tr>
<tr><td>2교시</td><td>국어</td><td><span class="prepPeriod">체육</span></td><td>수학</td><td>국어</td><td><span class="prepPeriod">체육</span></td></tr>
<tr><td>3교시</td><td><span class="prepPeriod">영어</span></td><td>국어</td><td>사회</td><td>수학</td><td>사회</td></tr>
<tr><td>4교시</td><td><span class="prepPeriod">과학</span></td><td>사회</td><td>실과</td><td><span class="prepPeriod">과학</span></td><td>과학</td></tr>
<tr><td>5교시</td><td>음악</td><td>미술</td><td><span class="prepPeriod">영어</span></td><td>실과</td><td><span class="prepPeriod">도덕</span></td></tr>
<tr><td>6교시</td><td>창체</td><td>미술</td><td>-</td><td>음악</td><td>창체</td></tr>
</table>
</div>
</div>
