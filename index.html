<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello Kitty Teacher Timer</title>

<style>
/* ================= COUNTDOWN RING PULSE ================= */
@keyframes ringPulseRed{
0%{filter:drop-shadow(0 0 3px rgba(255,51,133,.6));}
50%{filter:drop-shadow(0 0 18px rgba(255,51,133,1));}
100%{filter:drop-shadow(0 0 3px rgba(255,51,133,.6));}
}
@keyframes ringPulseBlue{
0%{filter:drop-shadow(0 0 3px rgba(0,191,255,.6));}
50%{filter:drop-shadow(0 0 18px rgba(0,191,255,1));}
100%{filter:drop-shadow(0 0 3px rgba(0,191,255,.6));}
}
@keyframes ringPulseGray{
0%{filter:drop-shadow(0 0 3px rgba(255,179,217,.5));}
50%{filter:drop-shadow(0 0 12px rgba(255,179,217,.9));}
100%{filter:drop-shadow(0 0 3px rgba(255,179,217,.5));}
}
.pulseClass{animation:ringPulseRed 2s infinite ease-in-out;}
.pulseBreak{animation:ringPulseBlue 2s infinite ease-in-out;}
.pulseLunch{animation:ringPulseRed 2s infinite ease-in-out;}
.pulseFree{animation:ringPulseGray 2s infinite ease-in-out;}

/* ================= HIGHLIGHT STYLES ================= */
.currentClass{
background:#fff0f5;
box-shadow:0 0 15px rgba(255,51,133,0.4);
font-weight:bold;
transition:all .3s ease;
}

/* AQUAMARINE FOR PREP PERIODS */
.prepPeriod {
  color: #20b2aa !important; /* Aquamarine */
}

.periodTime {
  font-size: 10px;
  color: #ff99cc;
  margin-right: 5px;
  display: none;
}

#scheduleTable td:hover .periodTime,
#scheduleTable td:active .periodTime {
  display: inline;
}

/* ================= EMOJI RAIN ================= */
.falling-emoji {
  position: fixed;
  top: -50px;
  z-index: 9999;
  pointer-events: none;
  font-size: 24px;
  animation: fall linear forwards;
}

@keyframes fall {
  to { transform: translateY(110vh) rotate(360deg); }
}

/* ================= THEME ================= */
body{
background:#ffe6f2; 
font-family:'Malgun Gothic', Arial;
color:#ff4d94;
text-align:center;
margin:0;
padding:20px;
overflow-x: hidden;
}
h2{margin:10px 0;cursor:pointer; color:#ff1a75;}
#clockBox{margin:auto;width:320px;}
canvas{background:white; border-radius:50%; box-shadow:0 0 20px rgba(255,102,178,.4); border: 8px solid #ffb3d9;}
#periodLabel{font-size:22px;font-weight:bold;margin-top:10px;}
#info{margin-top:20px; font-size:18px;}
#weather,#air{font-weight:bold; margin-top:5px; color:#ff66a3;}
table{margin:auto;margin-top:20px;border-collapse:collapse;width:95%;max-width:400px; background:white; border-radius:15px; overflow:hidden;}
th,td{padding:10px;border-bottom:1px solid #ffe6f2;}
th{color:white; background:#ffb3d9;}
.activeRowClass{background:rgba(255,0,102,.15);}
.activeRowLunch{background:rgba(255,102,178,.25);}
.lunchText{color:#ff3399;font-weight:bold;}

/* WEEK POPUP */
#weekPopup {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(255, 230, 242, 0.9);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}

#weekBox {
  background: white;
  padding: 20px;
  border-radius: 20px;
  width: 95%;
  max-width: 600px;
  color: #ff4d94;
  border: 4px solid #ffb3d9;
}

#weekBox h3 { margin-top: 0; text-align: center; color: #ff1a75; }
#weekTable { width: 100%; border-collapse: collapse; text-align: center; }
#weekTable th { background: #ffcce6; color: #ff3385; padding: 8px; }
#weekTable td { padding: 10px; border-top: 1px solid #ffe6f2; color: #ff4d94; font-size: 13px; }

.lunchRed { color: #ff1a75; font-size: 11px; font-weight: bold; }
</style>
</head>

<body>

<h2 id="today"></h2>

<div id="clockBox">
<canvas id="clock" width="300" height="300"></canvas>
</div>

<div id="periodLabel"></div>

<div id="info">
<div id="weather">🎀 날씨 불러오는 중...</div>
<div id="air">🌸 미세먼지 불러오는 중...</div>
</div>

<table id="scheduleTable">
<tr><th>교시</th><th>과목</th></tr>
</table>

<div id="weekPopup">
<div id="weekBox">
<h3>🎀 5학년 주간 시간표 🎀</h3>
<table id="weekTable">
<tr>
  <th>교시</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th>
</tr>
<tr>
  <td>1교시</td><td>수학</td><td>수학</td><td>국어</td><td><span class="prepPeriod">영어</span></td><td>국어</td>
</tr>
<tr>
  <td>2교시</td><td>국어</td><td><span class="prepPeriod">체육</span></td><td>수학</td><td>국어</td><td><span class="prepPeriod">체육</span></td>
</tr>
<tr>
  <td>3교시</td><td><span class="prepPeriod">영어</span></td><td>국어</td><td>사회</td><td>수학</td><td>사회</td>
</tr>
<tr>
  <td>4교시</td><td><span class="prepPeriod">과학</span><br><span class="lunchRed">점심 12:00-13:00</span></td><td>사회<br><span class="lunchRed">점심 12:00-13:00</span></td><td>실과<br><span class="lunchRed">점심 12:00-13:00</span></td><td><span class="prepPeriod">과학</span><br><span class="lunchRed">점심 12:00-13:00</span></td><td>과학<br><span class="lunchRed">점심 12:00-13:00</span></td>
</tr>
<tr>
  <td>5교시</td><td>음악</td><td>미술</td><td><span class="prepPeriod">영어</span></td><td>실과</td><td><span class="prepPeriod">도덕</span></td>
</tr>
<tr>
  <td>6교시</td><td>창체</td><td>미술</td><td>-</td><td>음악</td><td>창체</td>
</tr>
</table>
</div>
</div>

<script>
const API_KEY="fa9fe37b9be14839fe6774643939e974";

const schedule = {
  Monday: ["수학", "국어", "영어", "과학", "음악", "창체"],
  Tuesday: ["수학", "체육", "국어", "사회", "미술", "미술"],
  Wednesday: ["국어", "수학", "사회", "실과", "영어"],
  Thursday: ["영어", "국어", "수학", "과학", "실과", "음악"],
  Friday: ["국어", "체육", "사회", "과학(교실)", "도덕", "창체"]
};

const dayNames = {
  Monday: "월요일", Tuesday: "화요일", Wednesday: "수요일",
  Thursday: "목요일", Friday: "금요일", Saturday: "토요일", Sunday: "일요일"
};

const now = new Date();
const todayEn = now.toLocaleDateString('en-US', { weekday: 'long' });
document.getElementById("today").textContent = `🎀 ${dayNames[todayEn] || todayEn} 🎀`;

const table = document.getElementById("scheduleTable");
const standardDay = [
    { type: "class", label: "1교시", start: "09:00", end: "09:40" },
    { type: "break", start: "09:40", end: "09:50" },
    { type: "class", label: "2교시", start: "09:50", end: "10:30" },
    { type: "break", start: "10:30", end: "10:40" },
    { type: "class", label: "3교시", start: "10:40", end: "11:20" },
    { type: "class", label: "4교시", start: "11:20", end: "12:00" },
    { type: "lunch", label: "점심시간", start: "12:00", end: "13:00" },
    { type: "class", label: "5교시", start: "13:10", end: "13:50" },
    { type: "break", start: "13:50", end: "14:00" },
    { type: "class", label: "6교시", start: "14:00", end: "14:40" }
];

const dailyBlocks = {
  Monday: standardDay, Tuesday: standardDay, Wednesday: standardDay.slice(0, 7), Thursday: standardDay, Friday: standardDay
};

const blocks = dailyBlocks[todayEn];

if (!blocks) {
  table.innerHTML = "<tr><td colspan='2' style='font-size:22px; padding:30px;'>🎀 즐거운 주말 🎀</td></tr>";
} else {
  let classIndex = 0;
  blocks.forEach((b) => {
    if (b.type === "break") return;
    let row = document.createElement("tr");
    row.dataset.start = b.start; row.dataset.end = b.end;
    let p = document.createElement("td");
    let timeSpan = document.createElement("span");
    timeSpan.className = "periodTime"; timeSpan.textContent = `${b.start}-${b.end}`;
    p.appendChild(timeSpan); p.appendChild(document.createTextNode(b.label));
    let c = document.createElement("td");
    if (b.type === "class") {
        let subject = (schedule[todayEn] || [])[classIndex] || "-";
        c.textContent = subject;
        const preps = ["영어", "체육", "도덕"];
        if (preps.includes(subject) || (subject === "과학" && todayEn !== "Friday")) {
            c.classList.add("prepPeriod");
        }
        classIndex++;
    }
    if (b.type === "lunch") { c.innerHTML = '<span class="lunchText">맛있는 점심 🍱</span>'; }
    row.appendChild(p); row.appendChild(c);
    table.appendChild(row);
  });
}

function updateCurrentClass(){
const now=new Date(); const minutesNow=now.getHours()*60+now.getMinutes();
document.querySelectorAll("#scheduleTable tr").forEach(row=>{
const start=row.dataset.start; const end=row.dataset.end; if(!start||!end) return;
const [sh,sm]=start.split(":").map(Number); const [eh,em]=end.split(":").map(Number);
row.classList.toggle("currentClass", minutesNow >= (sh*60+sm) && minutesNow < (eh*60+em));
});
}
setInterval(updateCurrentClass,10000); updateCurrentClass();

const canvas=document.getElementById("clock");
const ctx=canvas.getContext("2d");
function toMin(t){let[h,m]=t.split(":"); return h*60+m;}

function drawClock(){
    let now = new Date();
    let mins = now.getHours()*60 + now.getMinutes() + now.getSeconds()/60;
    ctx.clearRect(0,0,300,300);
    ctx.beginPath(); ctx.arc(150,150,133,0,Math.PI*2); ctx.fillStyle="white"; ctx.fill();

    /* TICKS - DARK PINK */
    for(let i=0;i<60;i++){
        let angle=i*Math.PI/30; let len=i%5==0?15:7;
        let x1=150+Math.cos(angle)*(113-len); let y1=150+Math.sin(angle)*(113-len);
        let x2=150+Math.cos(angle)*113; let y2=150+Math.sin(angle)*113;
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
        ctx.strokeStyle="#ff80bf"; ctx.lineWidth=i%5==0?3:1; ctx.stroke();
    }
  
    let active = blocks ? blocks.find(b => mins >= toMin(b.start) && mins <= toMin(b.end)) : null;
    let label = "자유 시간 🎀"; let color = "#ffb3d9"; let total = 0; let remain = 0;

    // Prep Time Check (8:30am - 4:30pm Mon-Fri)
    const isWorkday = (now.getDay() >= 1 && now.getDay() <= 5);
    const isWorkHours = (mins >= 510 && mins <= 990);

    if(active){
        label = active.label;
        color = active.type==="break" ? "#00bfff" : "#ff1a75";
        
        // Check if current class is a "Prep" subject to change ring color
        if (active.type === "class") {
            let classIdx = blocks.filter((b, i) => b.type === "class" && blocks.indexOf(b) < blocks.indexOf(active)).length;
            let subject = (schedule[todayEn] || [])[classIdx];
            const preps = ["영어", "체육", "도덕"];
            if (preps.includes(subject) || (subject === "과학" && todayEn !== "Friday")) {
                color = "#20b2aa"; // Aquamarine
            }
        }
        
        total = toMin(active.end) - toMin(active.start);
        remain = toMin(active.end) - mins;
    } else if (blocks) {
        let nextBlock = blocks.find(b => mins < toMin(b.start));
        if(nextBlock){ 
            label = (isWorkday && isWorkHours) ? `수업 준비 시간 → ${nextBlock.label} ☕` : `자유 시간 → ${nextBlock.label} 🎀`;
            color = (isWorkday && isWorkHours) ? "#20b2aa" : "#ffb3d9";
            total = toMin(nextBlock.start) - mins; remain = total; 
        } else {
            label = (isWorkday && isWorkHours) ? "수업 준비 시간 ☕" : "자유 시간 🎀";
            color = (isWorkday && isWorkHours) ? "#20b2aa" : "#ffb3d9";
        }
    } else {
        color = "#ff66a3"; label = "🎀 주말 최고 🎀";
        let friday = new Date(now); let day = friday.getDay(); 
        let diffToFri = (day >= 5) ? (day - 5) : (day + 2);
        friday.setDate(now.getDate() - diffToFri); friday.setHours(16, 30, 0, 0);
        let monday = new Date(friday); monday.setDate(friday.getDate() + 3); monday.setHours(8, 30, 0, 0);
        total = monday.getTime() - friday.getTime(); remain = monday.getTime() - now.getTime();
    }

    if(total > 0){
        let percent = remain / total;
        ctx.beginPath(); ctx.arc(150,150,133,-Math.PI/2, -Math.PI/2 + percent * 2 * Math.PI);
        ctx.lineWidth = 6 + Math.sin(Date.now()/200)*2; ctx.strokeStyle = color; ctx.stroke();
    }

    let h = now.getHours(); let m = now.getMinutes().toString().padStart(2,"0"); let s = now.getSeconds().toString().padStart(2,"0");
    let ampm = h >= 12 ? "오후" : "오전"; h = h % 12 || 12;
    ctx.fillStyle="#ff3399"; ctx.font="bold 26px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(`${h}:${m}:${s} ${ampm}`, 150, 150);
    document.getElementById("periodLabel").textContent = label;
    document.getElementById("periodLabel").style.color = color;
}
setInterval(drawClock, 100);

function startEmojiRain() {
  setInterval(() => {
    if (!blocks) {
      const now = new Date();
      const isPooTime = (now.getDay() === 0 && now.getHours() >= 21);
      const emojis = isPooTime ? ['💩'] : ['🐱', '🎀', '🌸', '💖', '✨'];
      const e = document.createElement('div');
      e.className = 'falling-emoji';
      e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      e.style.left = Math.random() * 100 + 'vw';
      e.style.animationDuration = (Math.random() * 3 + 2) + 's';
      document.body.appendChild(e);
      setTimeout(() => e.remove(), 5000);
    }
  }, 350);
}
startEmojiRain();

async function loadWeather(){
try{
const geoRes=await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`);
const geoData=await geoRes.json(); const lat=geoData[0].lat; const lon=geoData[0].lon;
const res=await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`);
const data=await res.json();
const weatherMap = {"Clouds":"흐림", "Clear":"맑음", "Rain":"비", "Snow":"눈", "Drizzle":"이슬비", "Thunderstorm":"천둥번개"};
document.getElementById("weather").textContent=`🎀 날씨: ${weatherMap[data.weather[0].main] || data.weather[0].main} / ${data.main.temp.toFixed(1)}°C`;
}catch{ document.getElementById("weather").textContent="날씨 확인 불가 🎀"; }
}
loadWeather();

async function loadAir(){
try{
const geoRes=await fetch(`https://api.openweathermap.org/geo/1.0/direct?q=Dangjin,KR&limit=1&appid=${API_KEY}`);
const geoData=await geoRes.json(); const lat=geoData[0].lat; const lon=geoData[0].lon;
const res=await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API_KEY}`);
const data=await res.json(); const aqi=data.list[0].main.aqi;
const levels=["좋음 😊","보통 🙂","그저그럼 😐","나쁨 😷","매우나쁨 ☠️"];
document.getElementById("air").textContent=`🌸 미세먼지: ${levels[aqi-1]}`;
}catch{ document.getElementById("air").textContent="미세먼지 확인 불가 🌸"; }
}
loadAir();

const weekPopup=document.getElementById("weekPopup");
document.getElementById("today").onclick=()=>{ weekPopup.style.display="flex"; }
weekPopup.onclick=()=>{ weekPopup.style.display="none"; }
</script>
</body>
</html>
