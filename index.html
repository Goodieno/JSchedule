<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello Kitty Teacher Timer</title>
<style>
body{ background:#ffe6f2; font-family:'Malgun Gothic', Arial; color:#ff4d94; text-align:center; margin:0; padding:20px; overflow-x: hidden; }
h2{ margin:10px 0; cursor:pointer; color:#ff1a75; }
#clockBox{ margin:auto; width:320px; height:320px; display:flex; align-items:center; justify-content:center; }
canvas{ background:white; border-radius:50%; box-shadow:0 0 20px rgba(255,102,178,.4); border: 8px solid #ffb3d9; }
#periodLabel{ font-size:22px; font-weight:bold; margin-top:10px; }
table{ margin:auto; margin-top:20px; border-collapse:collapse; width:95%; max-width:400px; background:white; border-radius:15px; overflow:hidden; }
th,td{ padding:10px; border-bottom:1px solid #ffe6f2; }
th{ color:white; background:#ffb3d9; }
.currentClass{ background:#fff0f5 !important; box-shadow:0 0 15px rgba(255,51,133,0.4); font-weight:bold; }
.prepPeriod { color: #20b2aa !important; } 
</style>
</head>
<body>

<h2 id="today">🎀 시간표 🎀</h2>
<div id="clockBox"><canvas id="clock" width="300" height="300"></canvas></div>
<div id="periodLabel"></div>

<table id="scheduleTable">
    <thead><tr><th>교시</th><th>과목</th></tr></thead>
    <tbody id="scheduleBody"></tbody>
</table>

<script>
const schedule = {
  Monday: ["수학", "국어", "영어", "과학", "음악", "창체"],
  Tuesday: ["수학", "체육", "국어", "사회", "미술", "미술"],
  Wednesday: ["국어", "수학", "사회", "실과", "영어"],
  Thursday: ["영어", "국어", "수학", "과학", "실과", "음악"],
  Friday: ["국어", "체육", "사회", "과학(교실)", "도덕", "창체"]
};

const blocks = [
    { type: "class", label: "1교시", start: "09:00", end: "09:40" },
    { type: "break", label: "쉬는 시간", start: "09:40", end: "09:50" },
    { type: "class", label: "2교시", start: "09:50", end: "10:30" },
    { type: "break", label: "쉬는 시간", start: "10:30", end: "10:40" },
    { type: "class", label: "3교시", start: "10:40", end: "11:20" },
    { type: "break", label: "쉬는 시간", start: "11:20", end: "11:30" },
    { type: "class", label: "4교시", start: "11:30", end: "12:10" },
    { type: "lunch", label: "점심시간", start: "12:10", end: "13:10" },
    { type: "class", label: "5교시", start: "13:10", end: "13:50" },
    { type: "break", label: "쉬는 시간", start: "13:50", end: "14:00" },
    { type: "class", label: "6교시", start: "14:00", end: "14:40" }
];

const canvas=document.getElementById("clock");
const ctx=canvas.getContext("2d");
function toMin(t){let[h,m]=t.split(":"); return h*60+m;}

// Generate Table Rows
const now = new Date();
const todayEn = now.toLocaleDateString('en-US', { weekday: 'long' });
const tbody = document.getElementById("scheduleBody");
let classIdx = 0;

blocks.forEach(b => {
    if(b.type === "break") return;
    let row = document.createElement("tr");
    row.dataset.start = b.start; row.dataset.end = b.end;
    let td1 = document.createElement("td"); td1.textContent = b.label;
    let td2 = document.createElement("td");
    if(b.type === "class") {
        td2.textContent = (schedule[todayEn] || [])[classIdx] || "-";
        classIdx++;
    } else { td2.textContent = "점심 🍱"; }
    row.append(td1, td2);
    tbody.append(row);
});

let pulseGlow = 0; let pulseDir = 1;

function drawClock(){
    let d = new Date();
    let mins = d.getHours()*60 + d.getMinutes() + d.getSeconds()/60;
    ctx.clearRect(0,0,300,300);
    
    // Draw Background Face
    ctx.beginPath(); ctx.arc(150,150,133,0,Math.PI*2); ctx.fillStyle="white"; ctx.fill();

    // Draw Ticks
    for(let i=0;i<60;i++){
        let angle=i*Math.PI/30; let isMajor = i % 5 === 0;
        let x1=150+Math.cos(angle)*(isMajor?111:119); let y1=150+Math.sin(angle)*(isMajor?111:119);
        let x2=150+Math.cos(angle)*125; let y2=150+Math.sin(angle)*125;
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
        ctx.strokeStyle = isMajor ? "#ff66a3" : "#ffb3d9"; ctx.lineWidth = 2; ctx.stroke();
    }
  
    const isWednesday = (todayEn === "Wednesday");
    const schoolStart = toMin("09:00");
    const workEnd = isWednesday ? toMin("13:50") : toMin("14:40");
    let active = blocks.find(b => mins >= toMin(b.start) && mins < toMin(b.end));

    let label = "자유 시간 🙏"; let color = "#cccccc"; 
    let total = 60; let remain = 60 - (d.getMinutes() + d.getSeconds()/60);

    if (mins < schoolStart) {
        label = "수업 준비 중 ☕";
        total = schoolStart; // 0 to 540 mins
        remain = schoolStart - mins;
    } else if (mins < workEnd && active) {
        label = active.label;
        color = active.type === "class" ? "#ff1a75" : active.type === "break" ? "#00bfff" : "#ffd700";
        total = toMin(active.end) - toMin(active.start);
        remain = toMin(active.end) - mins;
    }

    // Draw Progress Ring
    let percent = remain / total;
    pulseGlow += 0.4 * pulseDir; if(pulseGlow > 14 || pulseGlow < 0) pulseDir *= -1;
    ctx.beginPath(); ctx.arc(150,150,140,-Math.PI/2, -Math.PI/2 + (percent * 2 * Math.PI));
    ctx.lineWidth = 10; ctx.strokeStyle = color; ctx.lineCap = "round";
    ctx.shadowBlur = pulseGlow; ctx.shadowColor = color; ctx.stroke();

    // Digital Clock
    let h = d.getHours() % 12 || 12; let m = d.getMinutes().toString().padStart(2,"0");
    ctx.shadowBlur = 0; ctx.fillStyle="#ff1a75"; ctx.font="bold 32px Arial"; ctx.textAlign="center";
    ctx.fillText(`${h}:${m}:${d.getSeconds().toString().padStart(2,"0")}`, 150, 165);

    document.getElementById("periodLabel").textContent = label;
    document.getElementById("periodLabel").style.color = color;

    // Highlight Table
    document.querySelectorAll("#scheduleTable tr").forEach(row => {
        if(!row.dataset.start) return;
        let isCurrent = (mins >= toMin(row.dataset.start) && mins < toMin(row.dataset.end));
        row.classList.toggle("currentClass", isCurrent);
    });
}
setInterval(drawClock, 50);
</script>
</body>
</html>
